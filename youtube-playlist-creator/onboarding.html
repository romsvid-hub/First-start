<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 400px; min-height: 300px; background: #0f0f0f; color: #fff; font-family: Inter, sans-serif; padding: 32px 24px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  p { font-size: 13px; color: #aaa; margin-bottom: 24px; line-height: 1.5; }
  .step { display: none; }
  .step.active { display: block; }
  label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; }
  .time-row { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
  select { background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer; }
  .btn { width: 100%; padding: 12px; background: #00c853; color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn:hover { background: #00e676; }
  .channels { max-height: 220px; overflow-y: auto; margin-bottom: 20px; }
  .channel-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
  .channel-item img { width: 32px; height: 32px; border-radius: 50%; }
  .channel-item span { font-size: 13px; flex: 1; }
  .channel-item input[type=checkbox] { accent-color: #00c853; width: 16px; height: 16px; }
  .loading { text-align: center; color: #aaa; font-size: 13px; padding: 20px 0; }
</style>
</head>
<body>

<div class="step active" id="step1">
  <h1>Привіт 👋</h1>
  <p>О котрій годині щодня оновлювати плейлист з новими відео?</p>
  <label>Час оновлення</label>
  <div class="time-row">
    <select id="hour">
      <script>
        for(let h=0;h<24;h++){
          document.write(`<option value="${h}" ${h===21?'selected':''}>${String(h).padStart(2,'0')}:00</option>`)
        }
      </script>
    </select>
  </div>
  <button class="btn" id="nextStep">Далі →</button>
</div>

<div class="step" id="step2">
  <h1>Обери канали</h1>
  <p>Плейлист формуватиметься з відео цих каналів.</p>
  <div class="channels" id="channelList">
    <div class="loading">Завантаження підписок...</div>
  </div>
  <button class="btn" id="saveSetup">Зберегти і почати</button>
</div>

<script src="onboarding.js"></script>
</body>
</html>
